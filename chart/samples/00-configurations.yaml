# Per-Kind Configuration CRs. oasgen-provider generates a `<Kind>Configuration`
# CRD for every RestDefinition whose OAS declares an http/bearer scheme; it
# carries the authentication block. All point at the SAME Secret (oxide-api-token)
# holding the Oxide API token. Create it first:
#
#   kubectl create secret generic oxide-api-token \
#     --from-literal=token="$(oxide auth status --token)" -n krateo-system
#
# Namespace assumed: krateo-system (adjust to your install namespace).
---
apiVersion: oxide.ogen.krateo.io/v1alpha1
kind: OxideProjectConfiguration
metadata:
  name: oxide-api
  namespace: krateo-system
spec:
  authentication:
    bearer:
      tokenRef:
        name: oxide-api-token
        namespace: krateo-system
        key: token
---
