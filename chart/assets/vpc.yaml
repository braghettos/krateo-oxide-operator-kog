openapi: 3.0.3
info:
  title: Oxide Region API - VPC (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the VPC resource, sufficient
    to manage it declaratively through the Krateo Operator Generator (KOG). A virtual private cloud network
    within a project.


    Oxide addresses resources by their user-supplied `name` (the {vpc} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideVpcConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideVpcCreate:
      type: object
      required:
      - name
      - description
      - dns_name
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        dns_name:
          type: string
          description: The name used for the VPC in internal DNS.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        ipv6_prefix:
          type: string
          description: Optional /48 IPv6 prefix; auto-allocated if omitted.
          example: fd12:3456::/64
    OxideVpcUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        dns_name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
    OxideVpc:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/vpcs:
    post:
      operationId: createOxideVpc
      summary: Create VPC
      tags:
      - vpc
      parameters:
      - name: project
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideVpcCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideVpc'
  /v1/vpcs/{vpc}:
    get:
      operationId: getOxideVpc
      summary: Get VPC
      tags:
      - vpc
      parameters:
      - name: vpc
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideVpc'
    put:
      operationId: updateOxideVpc
      summary: Update VPC
      tags:
      - vpc
      parameters:
      - name: vpc
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideVpcUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideVpc'
    delete:
      operationId: deleteOxideVpc
      summary: Delete VPC
      tags:
      - vpc
      parameters:
      - name: vpc
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
