openapi: 3.0.3
info:
  title: Oxide Region API - Floating IP (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the Floating IP resource,
    sufficient to manage it declaratively through the Krateo Operator Generator (KOG). A project-scoped
    floating IP. Attach/detach to instances is an action verb, out of KOG''s declarative scope.


    Oxide addresses resources by their user-supplied `name` (the {floating_ip} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideFloatingIpConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideFloatingIpCreate:
      type: object
      required:
      - name
      - description
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        address_allocator:
          type: object
          description: How to allocate the floating IP. type=explicit reserves `ip`; type=auto allocates
            from a pool (optionally selected by `pool_selector`).
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - explicit
              - auto
            ip:
              type: string
              format: ip
              description: The specific IP to reserve (required when type=explicit).
            pool_selector:
              type: object
              description: Which IP pool to allocate from. type=explicit uses `pool`; type=auto uses the
                silo default (optionally pinned by `ip_version`).
              required:
              - type
              properties:
                type:
                  type: string
                  enum:
                  - explicit
                  - auto
                pool:
                  type: string
                  description: Pool name or UUID (required when type=explicit).
                ip_version:
                  type: string
                  enum:
                  - v4
                  - v6
                  description: Pin IP version when multiple silo default pools exist.
    OxideFloatingIpUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
    OxideFloatingIp:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/floating-ips:
    post:
      operationId: createOxideFloatingIp
      summary: Create Floating IP
      tags:
      - floatingip
      parameters:
      - name: project
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideFloatingIpCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideFloatingIp'
  /v1/floating-ips/{floating_ip}:
    get:
      operationId: getOxideFloatingIp
      summary: Get Floating IP
      tags:
      - floatingip
      parameters:
      - name: floating_ip
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideFloatingIp'
    put:
      operationId: updateOxideFloatingIp
      summary: Update Floating IP
      tags:
      - floatingip
      parameters:
      - name: floating_ip
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideFloatingIpUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideFloatingIp'
    delete:
      operationId: deleteOxideFloatingIp
      summary: Delete Floating IP
      tags:
      - floatingip
      parameters:
      - name: floating_ip
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
