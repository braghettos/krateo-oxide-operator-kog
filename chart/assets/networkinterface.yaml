openapi: 3.0.3
info:
  title: Oxide Region API - Network Interface (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the Network Interface resource,
    sufficient to manage it declaratively through the Krateo Operator Generator (KOG). A network interface
    attached to an instance. Scoped by the `instance` (and optional `project`) query parameter.


    Oxide addresses resources by their user-supplied `name` (the {interface} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideNetworkInterfaceConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideNetworkInterfaceCreate:
      type: object
      required:
      - name
      - description
      - vpc_name
      - subnet_name
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        vpc_name:
          type: string
          description: The VPC in which to create the interface.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        subnet_name:
          type: string
          description: The VPC subnet in which to create the interface.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
    OxideNetworkInterfaceUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        primary:
          type: boolean
          description: Make this the instance's primary interface.
        transit_ips:
          type: array
          items:
            type: string
          description: Additional CIDR networks this interface may send/receive on.
    OxideNetworkInterface:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/network-interfaces:
    post:
      operationId: createOxideNetworkInterface
      summary: Create Network Interface
      tags:
      - networkinterface
      parameters:
      - name: instance
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideNetworkInterfaceCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideNetworkInterface'
  /v1/network-interfaces/{interface}:
    get:
      operationId: getOxideNetworkInterface
      summary: Get Network Interface
      tags:
      - networkinterface
      parameters:
      - name: interface
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: instance
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideNetworkInterface'
    put:
      operationId: updateOxideNetworkInterface
      summary: Update Network Interface
      tags:
      - networkinterface
      parameters:
      - name: interface
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: instance
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideNetworkInterfaceUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideNetworkInterface'
    delete:
      operationId: deleteOxideNetworkInterface
      summary: Delete Network Interface
      tags:
      - networkinterface
      parameters:
      - name: interface
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: instance
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
