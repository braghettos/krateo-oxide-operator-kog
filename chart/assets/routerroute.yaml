openapi: 3.0.3
info:
  title: Oxide Region API - Router Route (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the Router Route resource,
    sufficient to manage it declaratively through the Krateo Operator Generator (KOG). A route in a custom
    VPC router. Scoped by the `router` (and optional `vpc`/`project`) query parameter.


    Oxide addresses resources by their user-supplied `name` (the {route} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideRouterRouteConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideRouterRouteCreate:
      type: object
      required:
      - name
      - description
      - destination
      - target
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        destination:
          type: object
          description: Selects which traffic this routing rule applies to. `type` is one of ip, ip_net,
            vpc, subnet; `value` is the matching IP, CIDR or Name.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - ip
              - ip_net
              - vpc
              - subnet
            value:
              type: string
        target:
          type: object
          description: Where matched packets are forwarded. `type` is one of ip, vpc, subnet, instance,
            internet_gateway, drop; `value` is the target IP or Name.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - ip
              - vpc
              - subnet
              - instance
              - internet_gateway
              - drop
            value:
              type: string
    OxideRouterRouteUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        destination:
          type: object
          description: Selects which traffic this routing rule applies to. `type` is one of ip, ip_net,
            vpc, subnet; `value` is the matching IP, CIDR or Name.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - ip
              - ip_net
              - vpc
              - subnet
            value:
              type: string
        target:
          type: object
          description: Where matched packets are forwarded. `type` is one of ip, vpc, subnet, instance,
            internet_gateway, drop; `value` is the target IP or Name.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - ip
              - vpc
              - subnet
              - instance
              - internet_gateway
              - drop
            value:
              type: string
      required:
      - destination
      - target
    OxideRouterRoute:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/vpc-router-routes:
    post:
      operationId: createOxideRouterRoute
      summary: Create Router Route
      tags:
      - routerroute
      parameters:
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: router
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideRouterRouteCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideRouterRoute'
  /v1/vpc-router-routes/{route}:
    get:
      operationId: getOxideRouterRoute
      summary: Get Router Route
      tags:
      - routerroute
      parameters:
      - name: route
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: router
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideRouterRoute'
    put:
      operationId: updateOxideRouterRoute
      summary: Update Router Route
      tags:
      - routerroute
      parameters:
      - name: route
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: router
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideRouterRouteUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideRouterRoute'
    delete:
      operationId: deleteOxideRouterRoute
      summary: Delete Router Route
      tags:
      - routerroute
      parameters:
      - name: route
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: router
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
