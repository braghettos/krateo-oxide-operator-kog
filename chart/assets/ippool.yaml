openapi: 3.0.3
info:
  title: Oxide Region API - IP Pool (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the IP Pool resource, sufficient
    to manage it declaratively through the Krateo Operator Generator (KOG). A fleet IP pool. FLEET-ADMIN
    scope. Ranges and silo links are managed via separate (action) endpoints.


    Oxide addresses resources by their user-supplied `name` (the {pool} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideIpPoolConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideIpPoolCreate:
      type: object
      required:
      - name
      - description
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        ip_version:
          type: string
          enum:
          - v4
          - v6
          description: IP version of the pool (default v4).
        pool_type:
          type: string
          enum:
          - unicast
          - multicast
          description: Pool type (default unicast).
    OxideIpPoolUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
    OxideIpPool:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/system/ip-pools:
    post:
      operationId: createOxideIpPool
      summary: Create IP Pool
      tags:
      - ippool
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideIpPoolCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideIpPool'
  /v1/system/ip-pools/{pool}:
    get:
      operationId: getOxideIpPool
      summary: Get IP Pool
      tags:
      - ippool
      parameters:
      - name: pool
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideIpPool'
    put:
      operationId: updateOxideIpPool
      summary: Update IP Pool
      tags:
      - ippool
      parameters:
      - name: pool
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideIpPoolUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideIpPool'
    delete:
      operationId: deleteOxideIpPool
      summary: Delete IP Pool
      tags:
      - ippool
      parameters:
      - name: pool
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
