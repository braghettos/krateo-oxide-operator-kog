openapi: 3.0.3
info:
  title: Oxide Region API - Instance (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the Instance resource, sufficient
    to manage it declaratively through the Krateo Operator Generator (KOG). A virtual machine instance.
    Lifecycle power actions (start/stop/reboot) are out of KOG''s declarative scope; manage them separately.


    Oxide addresses resources by their user-supplied `name` (the {instance} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideInstanceConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideInstanceCreate:
      type: object
      required:
      - name
      - description
      - hostname
      - memory
      - ncpus
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        hostname:
          type: string
          description: RFC1035 hostname for the instance.
        memory:
          type: integer
          format: int64
          description: RAM allocated to the instance, in bytes.
        ncpus:
          type: integer
          format: int32
          description: Number of vCPUs allocated to the instance.
        start:
          type: boolean
          description: Start the instance on creation (default true).
        user_data:
          type: string
          description: Base64 cloud-init user data.
        boot_disk:
          type: string
          description: Disk to boot from (attached or created with the instance).
        auto_restart_policy:
          type: string
          enum:
          - never
          - best_effort
          description: Control-plane auto-restart policy on failure.
        ssh_public_keys:
          type: array
          items:
            type: string
            description: A Name or a UUID.
          description: Allowlist of SSH public keys (names or UUIDs) to transfer to the instance.
        external_ips:
          type: array
          items:
            type: object
            description: An external IP for the instance. type=ephemeral allocates from a pool; type=floating
              attaches an existing floating IP.
            required:
            - type
            properties:
              type:
                type: string
                enum:
                - ephemeral
                - floating
              pool_selector:
                type: object
                description: Which IP pool to allocate from. type=explicit uses `pool`; type=auto uses
                  the silo default (optionally pinned by `ip_version`).
                required:
                - type
                properties:
                  type:
                    type: string
                    enum:
                    - explicit
                    - auto
                  pool:
                    type: string
                    description: Pool name or UUID (required when type=explicit).
                  ip_version:
                    type: string
                    enum:
                    - v4
                    - v6
                    description: Pin IP version when multiple silo default pools exist.
              floating_ip:
                type: string
                description: Floating IP name or UUID (required when type=floating).
          description: External IP addresses to attach.
        disks:
          type: array
          items:
            type: object
            description: A disk to create-and-attach or attach at instance creation.
            required:
            - type
            - name
            properties:
              type:
                type: string
                enum:
                - create
                - attach
              name:
                type: string
                description: Disk name (existing disk for attach; new disk for create).
                minLength: 1
                maxLength: 63
                pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
              description:
                type: string
                description: Description (create only).
              size:
                type: integer
                format: int64
                description: Disk size in bytes (create only).
              disk_backend:
                type: object
                description: The source of a Disk's blocks.
                required:
                - type
                properties:
                  type:
                    type: string
                    enum:
                    - distributed
                    - local
                    description: 'distributed: backed by the rack''s distributed storage (default); local:
                      sled-local.'
                  disk_source:
                    type: object
                    description: The initial contents of a distributed disk's blocks.
                    required:
                    - type
                    properties:
                      type:
                        type: string
                        enum:
                        - blank
                        - snapshot
                        - image
                        description: 'blank: empty disk; snapshot: clone of a snapshot; image: clone of
                          an image.'
                      block_size:
                        type: integer
                        enum:
                        - 512
                        - 2048
                        - 4096
                        description: Block size in bytes (required when type=blank).
                      image_id:
                        type: string
                        format: uuid
                        description: Source image UUID (required when type=image).
                      snapshot_id:
                        type: string
                        format: uuid
                        description: Source snapshot UUID (required when type=snapshot).
                      read_only:
                        type: boolean
                        description: Create the disk read-only (snapshot/image sources only).
          description: Disks to create and/or attach at boot.
    OxideInstanceUpdate:
      type: object
      properties:
        boot_disk:
          type: string
          description: Disk to boot from (instance must be stopped).
        memory:
          type: integer
          format: int64
          description: RAM in bytes (instance must be stopped).
        ncpus:
          type: integer
          format: int32
          description: vCPU count (instance must be stopped).
        auto_restart_policy:
          type: string
          enum:
          - never
          - best_effort
          description: Auto-restart policy.
    OxideInstance:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/instances:
    post:
      operationId: createOxideInstance
      summary: Create Instance
      tags:
      - instance
      parameters:
      - name: project
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideInstanceCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideInstance'
  /v1/instances/{instance}:
    get:
      operationId: getOxideInstance
      summary: Get Instance
      tags:
      - instance
      parameters:
      - name: instance
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideInstance'
    put:
      operationId: updateOxideInstance
      summary: Update Instance
      tags:
      - instance
      parameters:
      - name: instance
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideInstanceUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideInstance'
    delete:
      operationId: deleteOxideInstance
      summary: Delete Instance
      tags:
      - instance
      parameters:
      - name: instance
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
