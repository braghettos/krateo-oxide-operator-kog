openapi: 3.0.3
info:
  title: Oxide Region API - Anti-Affinity Group (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the Anti-Affinity Group resource,
    sufficient to manage it declaratively through the Krateo Operator Generator (KOG). A group of instances
    that should be kept apart (different sleds).


    Oxide addresses resources by their user-supplied `name` (the {anti_affinity_group} path parameter);
    the server-generated `id` is read-only. The http/bearer security scheme makes oasgen-provider emit
    a OxideAntiAffinityGroupConfiguration CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideAntiAffinityGroupCreate:
      type: object
      required:
      - name
      - description
      - failure_domain
      - policy
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        failure_domain:
          type: string
          enum:
          - sled
          description: Scope of anti-co-location.
        policy:
          type: string
          enum:
          - allow
          - fail
          description: What to do when the anti-affinity request cannot be satisfied.
    OxideAntiAffinityGroupUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
    OxideAntiAffinityGroup:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/anti-affinity-groups:
    post:
      operationId: createOxideAntiAffinityGroup
      summary: Create Anti-Affinity Group
      tags:
      - antiaffinitygroup
      parameters:
      - name: project
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideAntiAffinityGroupCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideAntiAffinityGroup'
  /v1/anti-affinity-groups/{anti_affinity_group}:
    get:
      operationId: getOxideAntiAffinityGroup
      summary: Get Anti-Affinity Group
      tags:
      - antiaffinitygroup
      parameters:
      - name: anti_affinity_group
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideAntiAffinityGroup'
    put:
      operationId: updateOxideAntiAffinityGroup
      summary: Update Anti-Affinity Group
      tags:
      - antiaffinitygroup
      parameters:
      - name: anti_affinity_group
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideAntiAffinityGroupUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideAntiAffinityGroup'
    delete:
      operationId: deleteOxideAntiAffinityGroup
      summary: Delete Anti-Affinity Group
      tags:
      - antiaffinitygroup
      parameters:
      - name: anti_affinity_group
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
