openapi: 3.0.3
info:
  title: Oxide Region API - VPC Subnet (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the VPC Subnet resource, sufficient
    to manage it declaratively through the Krateo Operator Generator (KOG). A subnet within a VPC. Scoped
    by the `vpc` (and optional `project`) query parameter.


    Oxide addresses resources by their user-supplied `name` (the {subnet} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideVpcSubnetConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideVpcSubnetCreate:
      type: object
      required:
      - name
      - description
      - ipv4_block
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        ipv4_block:
          type: string
          description: IPv4 CIDR for the subnet (RFC1918, non-overlapping within the VPC).
          example: 172.30.0.0/22
        ipv6_block:
          type: string
          description: Optional IPv6 CIDR; derived from the VPC prefix if omitted.
          example: fd12:3456::/64
        custom_router:
          type: string
          description: Optional custom router to direct subnet egress.
    OxideVpcSubnetUpdate:
      type: object
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        custom_router:
          type: string
          description: Attach/replace the subnet's custom router.
    OxideVpcSubnet:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/vpc-subnets:
    post:
      operationId: createOxideVpcSubnet
      summary: Create VPC Subnet
      tags:
      - vpcsubnet
      parameters:
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideVpcSubnetCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideVpcSubnet'
  /v1/vpc-subnets/{subnet}:
    get:
      operationId: getOxideVpcSubnet
      summary: Get VPC Subnet
      tags:
      - vpcsubnet
      parameters:
      - name: subnet
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideVpcSubnet'
    put:
      operationId: updateOxideVpcSubnet
      summary: Update VPC Subnet
      tags:
      - vpcsubnet
      parameters:
      - name: subnet
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideVpcSubnetUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideVpcSubnet'
    delete:
      operationId: deleteOxideVpcSubnet
      summary: Delete VPC Subnet
      tags:
      - vpcsubnet
      parameters:
      - name: subnet
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      - name: vpc
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
