openapi: 3.0.3
info:
  title: Oxide Region API - Image (KOG subset)
  version: v1
  description: 'Hand-curated OpenAPI 3.0 subset of the Oxide Region API for the Image resource, sufficient
    to manage it declaratively through the Krateo Operator Generator (KOG). A bootable disk image. Project-scoped
    when `project` is set. Immutable (no update verb).


    Oxide addresses resources by their user-supplied `name` (the {image} path parameter); the server-generated
    `id` is read-only. The http/bearer security scheme makes oasgen-provider emit a OxideImageConfiguration
    CRD carrying the API token.'
servers:
- url: '{{ .Values.oxide.apiUrl }}'
  description: Base URL of the Oxide silo API (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: 'Oxide API token (Authorization: Bearer <token>).'
  schemas:
    OxideImageCreate:
      type: object
      required:
      - name
      - description
      - os
      - version
      - source
      properties:
        name:
          type: string
          description: Names must begin with a lowercase ASCII letter, be composed of lowercase/uppercase
            ASCII, numbers and '-', and may not end with '-'. At most 63 chars. Cannot be a bare UUID.
          minLength: 1
          maxLength: 63
          pattern: ^(?![0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$)^[a-z]([a-zA-Z0-9-]*[a-zA-Z0-9]+)?$
        description:
          type: string
          description: Human-readable free-form text about the resource.
        os:
          type: string
          description: OS family, e.g. debian, ubuntu.
        version:
          type: string
          description: OS version, e.g. 22.04.
        source:
          type: object
          description: Image contents source. type=snapshot clones an existing snapshot.
          required:
          - type
          - id
          properties:
            type:
              type: string
              enum:
              - snapshot
            id:
              type: string
              format: uuid
              description: Source snapshot UUID.
    OxideImage:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-generated immutable identifier.
        name:
          type: string
          description: User-supplied name (natural key).
        description:
          type: string
        time_created:
          type: string
          format: date-time
          readOnly: true
        time_modified:
          type: string
          format: date-time
          readOnly: true
paths:
  /v1/images:
    post:
      operationId: createOxideImage
      summary: Create Image
      tags:
      - image
      parameters:
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OxideImageCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideImage'
  /v1/images/{image}:
    get:
      operationId: getOxideImage
      summary: Get Image
      tags:
      - image
      parameters:
      - name: image
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OxideImage'
    delete:
      operationId: deleteOxideImage
      summary: Delete Image
      tags:
      - image
      parameters:
      - name: image
        in: path
        required: true
        schema:
          type: string
          description: A Name or a UUID.
      - name: project
        in: query
        required: false
        schema:
          type: string
          description: A Name or a UUID.
      responses:
        '204':
          description: Deleted
