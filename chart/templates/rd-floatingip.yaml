{{- if .Values.restDefinitions.floatingip.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-floatingip
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-floatingip/floatingip.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.floatingip.kind }}
    # OxideFloatingIp is addressed by its user-supplied `name` (the {floating_ip} path param); `id` is
    # server-generated/read-only. Project-scoped: the `project` query param is a spec field.
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {floating_ip} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - floating_ip
    verbsDescription:
      - action: create
        method: POST
        path: /v1/floating-ips
      - action: get
        method: GET
        path: /v1/floating-ips/{floating_ip}
        requestFieldMapping:
          - inPath: floating_ip
            inCustomResource: spec.name
      - action: update
        method: PUT
        path: /v1/floating-ips/{floating_ip}
        requestFieldMapping:
          - inPath: floating_ip
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/floating-ips/{floating_ip}
        requestFieldMapping:
          - inPath: floating_ip
            inCustomResource: spec.name
{{- end }}
