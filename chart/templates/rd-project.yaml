{{- if .Values.restDefinitions.project.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-project
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-project/project.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.project.kind }}
    # OxideProject is addressed by its user-supplied `name` (the {project} path param); `id` is
    # server-generated/read-only. Silo-scoped resource.
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {project} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - project
    verbsDescription:
      - action: create
        method: POST
        path: /v1/projects
      - action: get
        method: GET
        path: /v1/projects/{project}
        requestFieldMapping:
          - inPath: project
            inCustomResource: spec.name
      - action: update
        method: PUT
        path: /v1/projects/{project}
        requestFieldMapping:
          - inPath: project
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/projects/{project}
        requestFieldMapping:
          - inPath: project
            inCustomResource: spec.name
{{- end }}
