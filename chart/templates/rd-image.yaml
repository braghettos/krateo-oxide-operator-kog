{{- if .Values.restDefinitions.image.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-image
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-image/image.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.image.kind }}
    # OxideImage is addressed by its user-supplied `name` (the {image} path param); `id` is
    # server-generated/read-only. Project-scoped: the `project` query param is a spec field.
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {image} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - image
    verbsDescription:
      - action: create
        method: POST
        path: /v1/images
      - action: get
        method: GET
        path: /v1/images/{image}
        requestFieldMapping:
          - inPath: image
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/images/{image}
        requestFieldMapping:
          - inPath: image
            inCustomResource: spec.name
{{- end }}
