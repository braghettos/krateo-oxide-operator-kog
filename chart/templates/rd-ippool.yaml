{{- if .Values.restDefinitions.ippool.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-ippool
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-ippool/ippool.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.ippool.kind }}
    # OxideIpPool is addressed by its user-supplied `name` (the {pool} path param); `id` is
    # server-generated/read-only. Fleet/system-scoped resource (requires fleet-admin token).
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {pool} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - pool
    verbsDescription:
      - action: create
        method: POST
        path: /v1/system/ip-pools
      - action: get
        method: GET
        path: /v1/system/ip-pools/{pool}
        requestFieldMapping:
          - inPath: pool
            inCustomResource: spec.name
      - action: update
        method: PUT
        path: /v1/system/ip-pools/{pool}
        requestFieldMapping:
          - inPath: pool
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/system/ip-pools/{pool}
        requestFieldMapping:
          - inPath: pool
            inCustomResource: spec.name
{{- end }}
