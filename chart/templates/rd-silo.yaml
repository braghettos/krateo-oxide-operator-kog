{{- if .Values.restDefinitions.silo.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-silo
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-silo/silo.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.silo.kind }}
    # OxideSilo is addressed by its user-supplied `name` (the {silo} path param); `id` is
    # server-generated/read-only. Fleet/system-scoped resource (requires fleet-admin token).
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {silo} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - silo
    verbsDescription:
      - action: create
        method: POST
        path: /v1/system/silos
      - action: get
        method: GET
        path: /v1/system/silos/{silo}
        requestFieldMapping:
          - inPath: silo
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/system/silos/{silo}
        requestFieldMapping:
          - inPath: silo
            inCustomResource: spec.name
{{- end }}
