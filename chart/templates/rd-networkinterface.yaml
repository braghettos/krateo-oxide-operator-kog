{{- if .Values.restDefinitions.networkinterface.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-networkinterface
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-networkinterface/networkinterface.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.networkinterface.kind }}
    # OxideNetworkInterface is addressed by its user-supplied `name` (the {interface} path param); `id` is
    # server-generated/read-only. Instance-scoped via the `instance` (and optional `project`) query param.
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {interface} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - interface
    verbsDescription:
      - action: create
        method: POST
        path: /v1/network-interfaces
      - action: get
        method: GET
        path: /v1/network-interfaces/{interface}
        requestFieldMapping:
          - inPath: interface
            inCustomResource: spec.name
      - action: update
        method: PUT
        path: /v1/network-interfaces/{interface}
        requestFieldMapping:
          - inPath: interface
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/network-interfaces/{interface}
        requestFieldMapping:
          - inPath: interface
            inCustomResource: spec.name
{{- end }}
