{{- if .Values.restDefinitions.internetgateway.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-internetgateway
  labels:
    {{- include "krateo-oxide-operator-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-internetgateway/internetgateway.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.internetgateway.kind }}
    # OxideInternetGateway is addressed by its user-supplied `name` (the {gateway} path param); `id` is
    # server-generated/read-only. VPC-scoped via the `vpc` (and optional `project`) query param.
    identifiers:
      - name
    additionalStatusFields:
      - id
    # The {gateway} path placeholder would otherwise surface as a redundant spec field;
    # exclude it and source its value from spec.name via requestFieldMapping below.
    excludedSpecFields:
      - gateway
    verbsDescription:
      - action: create
        method: POST
        path: /v1/internet-gateways
      - action: get
        method: GET
        path: /v1/internet-gateways/{gateway}
        requestFieldMapping:
          - inPath: gateway
            inCustomResource: spec.name
      - action: delete
        method: DELETE
        path: /v1/internet-gateways/{gateway}
        requestFieldMapping:
          - inPath: gateway
            inCustomResource: spec.name
{{- end }}
